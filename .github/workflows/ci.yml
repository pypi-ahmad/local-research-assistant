name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: lra
          POSTGRES_PASSWORD: lra_password
          POSTGRES_DB: lra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lra -d lra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://lra:lra_password@localhost:5432/lra
      SYNC_DATABASE_URL: postgresql+psycopg://lra:lra_password@localhost:5432/lra
      REDIS_URL: redis://localhost:6379/0
      QDRANT_URL: http://localhost:16333
      NEO4J_URI: bolt://localhost:17687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_password
      MINIO_ENDPOINT: localhost:19000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio_password
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
      - run: uv python install 3.12.10
      - run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck (advisory)
        run: uv run mypy apps/api/src || true

      - name: Unit + Integration Tests
        run: uv run pytest apps/api/tests/unit apps/api/tests/integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
